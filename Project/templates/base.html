<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vinyl Discovery{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topnav">
        <a href="{{ url_for('index') }}" class="logo">vinyl.discovery</a>
        <nav>
            <a href="{{ url_for('index') }}">catalog</a>
            <a href="{{ url_for('favorites_page') }}">favorites</a>
            <a href="{{ url_for('history_page') }}">history</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-email">vinyl.discovery@gmail.com</div>
            <div class="footer-links">
                <a href="{{ url_for('index') }}">catalog</a>
                <a href="{{ url_for('favorites_page') }}">favorites</a>
                <a href="{{ url_for('history_page') }}">history</a>
            </div>
        </div>
    </footer>
</body>
</html>
